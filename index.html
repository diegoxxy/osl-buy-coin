<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSL Token Purchase</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap');
        
        .font-sans-retro { font-family: 'Space Grotesk', sans-serif; }
        
        #sellBtn {
            transition: transform 0.12s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
        }

        /* Flash effect when price updates */
        .price-flash {
            animation: flashGreen 0.5s ease-out;
        }
        @keyframes flashGreen {
            0% { color: #22c55e; }
            100% { color: #1e293b; }
        }
    </style>
</head>
<body class="bg-[#FAF8F5] min-h-screen flex flex-col justify-between font-sans-retro text-slate-800 antialiased overflow-hidden select-none">

    <header class="w-full px-8 py-6 flex justify-start items-center bg-transparent">
        <img src="osl_logo.png" alt="OSL Logo" class="w-20 h-20 object-contain">
    </header>

    <main class="flex-1 flex flex-col items-center justify-center p-4 text-center relative max-w-2xl mx-auto w-full -mt-16">
        
        <div class="mb-6 relative z-0">
            <div class="w-40 h-44 bg-[#EFECE6] clip-hex flex items-center justify-center mx-auto opacity-80 shadow-sm relative">
                <div class="w-28 h-28 bg-white rounded-full flex items-center justify-center shadow-md border border-rose-100 animate-pulse">
                    <img src="bitcoin.png" alt="Bitcoin" class="w-16 h-16 object-contain">
                </div>
            </div>
        </div>

        <div class="mb-16 flex flex-col items-center gap-1">
            <span class="text-2xl font-bold tracking-wider text-slate-900 bg-slate-200/60 px-4 py-1 rounded-md">BTC / USD</span>
            <div class="flex items-center gap-3 mt-1">
                <span id="btcPrice" class="text-3xl font-extrabold tracking-tight text-slate-800">$67,245.50</span>
                <span id="btcChange" class="text-lg font-bold text-green-500 bg-green-50 px-2.5 py-0.5 rounded-md border border-green-200">+4.25%</span>
            </div>
        </div>

        <div class="flex items-center justify-center gap-6 w-full min-h-[140px] relative" id="actionZone">
            <button id="buyBtn" onclick="handleBuyClick()" class="bg-[#4eb300] hover:bg-[#439900] text-white font-bold text-xl px-14 py-4 rounded-full shadow-lg shadow-green-600/20 cursor-pointer active:scale-95 z-20">
                Beli
            </button>

            <button id="sellBtn" class="bg-[#ff2323] hover:bg-[#e01f1f] text-white font-bold text-xl px-14 py-4 rounded-full shadow-lg shadow-red-600/20 z-30 transform select-none">
                Jual
            </button>
        </div>

    </main>

    <footer class="w-full py-6 text-center text-xs text-slate-400 font-medium z-10">
        &copy; 2026 OSL Indonesia.
    </footer>

    <script>
        const sellBtn = document.getElementById('sellBtn');
        const priceEl = document.getElementById('btcPrice');
        const changeEl = document.getElementById('btcChange');

        // --- SIMULASI LIVE PRICE BTC ---
        let basePrice = 67245.50;
        let baseChange = 4.25;

        setInterval(() => {
            const cryptoFluctuation = (Math.random() - 0.45) * 15; 
            basePrice += cryptoFluctuation;
            baseChange += (cryptoFluctuation / 1000);

            priceEl.innerText = `$${basePrice.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            changeEl.innerText = `+${baseChange.toFixed(2)}%`;

            if (cryptoFluctuation > 0) {
                priceEl.classList.add('price-flash');
                setTimeout(() => priceEl.classList.remove('price-flash'), 500);
            }
        }, 2000);


        // --- LOGIKA TOMBOL JUAL KABUR JAUH ---
        function dodgeSellButton() {
            const minOffsetX = 350;  
            const maxOffsetX = 650;  
            let offsetX = (Math.random() * (maxOffsetX - minOffsetX) + minOffsetX) * (Math.random() < 0.5 ? -1 : 1);

            const minOffsetY = 180;  
            const maxOffsetY = 380;  
            let offsetY = -(Math.random() * (maxOffsetY - minOffsetY) + minOffsetY); 

            const btnRect = sellBtn.getBoundingClientRect();
            
            if (btnRect.left + offsetX < 20) offsetX = 350;
            if (btnRect.right + offsetX > window.innerWidth - 20) offsetX = -350;
            if (btnRect.top + offsetY < 80) offsetY = -180;

            sellBtn.style.transform = `translate(${offsetX}px, ${offsetY}px) rotate(${offsetX * 0.05}deg)`;
        }

        sellBtn.addEventListener('mouseenter', dodgeSellButton);
        sellBtn.addEventListener('mouseover', dodgeSellButton);
        sellBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            dodgeSellButton();
        });

        function handleBuyClick() {
            alert('🎉 Transaksi Berhasil! Welcome to the OSL Alpha Clan.');
            sellBtn.style.transform = 'translate(0px, 0px) rotate(0deg)';
        }
    </script>

    <style>
        .clip-hex { clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); }
    </style>
</body>
</html>
