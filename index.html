<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSL Token Purchase</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Space+Grotesk:wght@500;700&display=swap');
        
        .font-serif-retro { font-family: 'Playfair Display', serif; }
        .font-sans-retro { font-family: 'Space Grotesk', sans-serif; }
        
        #sellBtn {
            /* Kecepatan transisi dipertahankan responsif untuk lompatan jauh */
            transition: transform 0.12s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
        }
    </style>
</head>
<body class="bg-[#FAF8F5] min-h-screen flex flex-col justify-between font-sans-retro text-slate-800 antialiased overflow-hidden select-none">

    <header class="w-full px-8 py-6 flex justify-start items-center bg-transparent">
        <img src="osl_logo.png" alt="OSL Logo" class="w-20 h-20 object-contain">
    </header>

    <main class="flex-1 flex flex-col items-center justify-center p-4 text-center relative max-w-2xl mx-auto w-full -mt-12">
        
        <div class="mb-8 relative z-0">
            <div class="w-40 h-44 bg-[#EFECE6] clip-hex flex items-center justify-center mx-auto opacity-80 shadow-sm relative">
                <div class="w-28 h-28 bg-white rounded-full flex items-center justify-center shadow-md border border-rose-100 animate-pulse">
                    <img src="bitcoin.png" alt="Bitcoin" class="w-16 h-16 object-contain">
                </div>
            </div>
        </div>

        <h1 class="font-serif-retro text-4xl md:text-5xl text-[#E11D48] leading-tight font-bold px-4 mb-12 max-w-xl">
            Apakah kamu akan membeli coin ini?
        </h1>

        <div class="flex items-center justify-center gap-6 w-full min-h-[140px] relative" id="actionZone">
            <button id="buyBtn" onclick="handleBuyClick()" class="bg-[#ADFF2F] hover:bg-[#96EC16] text-slate-900 font-bold text-xl px-12 py-4 rounded-full shadow-lg shadow-lime-500/20 cursor-pointer active:scale-95 z-20">
                BUY
            </button>

            <button id="sellBtn" class="bg-[#E11D48] hover:bg-[#BE123C] text-white font-bold text-lg px-10 py-3.5 rounded-full shadow-md shadow-rose-500/10 z-30 transform select-none">
                SELL
            </button>
        </div>

    </main>

    <footer class="w-full py-6 text-center text-xs text-slate-400 font-medium z-10">
        &copy; 2026 OSL Indonesia.
    </footer>

    <script>
        const sellBtn = document.getElementById('sellBtn');

        function dodgeSellButton() {
            // Area jangkauan horizontal diperluas maksimal (bisa sampai ujung kanan/kiri halaman)
            const minOffsetX = 350;  // Lompatan minimal langsung sejauh 350px
            const maxOffsetX = 650;  // Lompatan maksimal mencapai 650px
            let offsetX = (Math.random() * (maxOffsetX - minOffsetX) + minOffsetX) * (Math.random() < 0.5 ? -1 : 1);

            // Area jangkauan vertikal ke atas juga dipertinggi secara maksimal
            const minOffsetY = 180;  // Lompatan minimal ke atas 180px
            const maxOffsetY = 380;  // Lompatan maksimal ke atas hingga 380px
            let offsetY = -(Math.random() * (maxOffsetY - minOffsetY) + minOffsetY); 

            // Kalkulasi batas pengaman dinamis agar tombol tidak mental keluar dari batas layar browser (Viewport)
            const btnRect = sellBtn.getBoundingClientRect();
            
            // Jaga batas kiri & kanan layar
            if (btnRect.left + offsetX < 20) offsetX = 350;
            if (btnRect.right + offsetX > window.innerWidth - 20) offsetX = -350;
            
            // Jaga batas atas layar agar tidak kelewat ke atas header
            if (btnRect.top + offsetY < 80) offsetY = -180;

            // Eksekusi perpindahan gaya 'teleportasi jauh'
            sellBtn.style.transform = `translate(${offsetX}px, ${offsetY}px) rotate(${offsetX * 0.05}deg)`;
        }

        // Trigger interaksi
        sellBtn.addEventListener('mouseenter', dodgeSellButton);
        sellBtn.addEventListener('mouseover', dodgeSellButton);
        sellBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            dodgeSellButton();
        });

        function handleBuyClick() {
            alert('🎉 Transaksi Berhasil! Welcome to the OSL Alpha Clan.');
            sellBtn.style.transform = 'translate(0px, 0px) rotate(0deg)';
        }
    </script>

    <style>
        .clip-hex { clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); }
    </style>
</body>
</html>
